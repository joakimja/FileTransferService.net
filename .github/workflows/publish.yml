name: Build and publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  actions: read

jobs:
  publish:
    name: Publish ${{ matrix.framework }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: net8.0
            framework-name: net8
          - framework: net10.0
            framework-name: net10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Read version from project
        id: project
        shell: pwsh
        run: |
          [xml] $project = Get-Content "FileTransferServiceApi/FileTransferServiceApi.csproj"
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "No Version property was found in FileTransferServiceApi.csproj."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish ${{ matrix.framework }}
        shell: pwsh
        run: |
          dotnet publish "FileTransferServiceApi/FileTransferServiceApi.csproj" `
            --configuration Release `
            --framework "${{ matrix.framework }}" `
            --runtime win-x64 `
            --self-contained true `
            --output "${{ runner.temp }}/publish/${{ matrix.framework-name }}"

      - name: Create ZIP archive
        id: package
        shell: pwsh
        run: |
          $fileName = "FTSApi-v${{ steps.project.outputs.version }}-win-x64-selfcontained-${{ matrix.framework-name }}.zip"
          $archivePath = Join-Path "${{ runner.temp }}" $fileName

          Compress-Archive `
            -Path "${{ runner.temp }}/publish/${{ matrix.framework-name }}/*" `
            -DestinationPath $archivePath `
            -CompressionLevel Optimal

          "file-name=$fileName" >> $env:GITHUB_OUTPUT
          "archive-path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.file-name }}
          path: ${{ steps.package.outputs.archive-path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate release version
        shell: pwsh
        run: |
          [xml] $project = Get-Content "FileTransferServiceApi/FileTransferServiceApi.csproj"
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1
          $expectedTag = "v$version"

          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Git tag '${{ github.ref_name }}' does not match project version '$expectedTag'."
          }

      - name: Download build artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ github.run_id }}" `
            --repo "${{ github.repository }}" `
            --dir "${{ runner.temp }}/release-artifacts"

      - name: Create release and upload ZIP files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipFiles = Get-ChildItem `
            -Path "${{ runner.temp }}/release-artifacts" `
            -Filter "*.zip" `
            -File `
            -Recurse

          if ($zipFiles.Count -ne 2) {
            throw "Expected 2 ZIP files, but found $($zipFiles.Count)."
          }

          gh release view $tag --repo "${{ github.repository }}" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipFiles.FullName `
              --repo "${{ github.repository }}" `
              --clobber
          }
          else {
            gh release create $tag $zipFiles.FullName `
              --repo "${{ github.repository }}" `
              --verify-tag `
              --title "FTSApi $tag" `
              --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release creation failed."
          }
