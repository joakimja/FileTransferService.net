name: Build and publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build release packages
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Read and validate version
        id: project
        shell: pwsh
        run: |
          [xml] $project = Get-Content "FileTransferServiceApi/FileTransferServiceApi.csproj"
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "No Version property was found in FileTransferServiceApi.csproj."
          }

          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Git tag '${{ github.ref_name }}' does not match project version 'v$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish and package .NET 8 and .NET 10
        shell: pwsh
        run: |
          $targets = @(
            @{ Framework = "net8.0"; PackageName = "net8" },
            @{ Framework = "net10.0"; PackageName = "net10" }
          )

          foreach ($target in $targets) {
            $publishPath = Join-Path "${{ runner.temp }}/publish" $target.PackageName
            $archivePath = Join-Path "${{ runner.temp }}" "FTSApi-win-x64-selfcontained-$($target.PackageName).zip"

            dotnet publish "FileTransferServiceApi/FileTransferServiceApi.csproj" `
              --configuration Release `
              --framework $target.Framework `
              --runtime win-x64 `
              --self-contained true `
              --output $publishPath

            if ($LASTEXITCODE -ne 0) {
              throw "Publishing $($target.Framework) failed."
            }

            Compress-Archive `
              -Path "$publishPath/*" `
              -DestinationPath $archivePath `
              -CompressionLevel Optimal
          }

      - name: Create release and upload ZIP files
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipFiles = Get-ChildItem `
            -Path "${{ runner.temp }}" `
            -Filter "FTSApi-win-x64-selfcontained-*.zip" `
            -File

          if ($zipFiles.Count -ne 2) {
            throw "Expected 2 ZIP files, but found $($zipFiles.Count)."
          }

          gh release view $tag --repo "${{ github.repository }}" *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zipFiles.FullName `
              --repo "${{ github.repository }}" `
              --clobber
          }
          else {
            gh release create $tag $zipFiles.FullName `
              --repo "${{ github.repository }}" `
              --verify-tag `
              --title "FTSApi v${{ steps.project.outputs.version }}" `
              --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release creation failed."
          }
